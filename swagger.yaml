openapi: 3.0.0
info:
  title: Smart Attendance API
  version: 1.0.0
  description: API Documentation for the Student Attendance Ecosystem

servers:
  - url: http://localhost:3000
    description: Local development server

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

paths:
  /api/auth/register:
    post:
      tags: [Authentication]
      summary: Register a new user
      responses:
        '201':
          description: User created successfully

  /api/auth/login:
    post:
      tags: [Authentication]
      summary: Authenticate user & get token
      responses:
        '200':
          description: Login successful

  /api/attendance/session:
    post:
      tags: [Attendance]
      summary: Start a new attendance session
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Session started (Professors only)

  /api/attendance/scan:
    post:
      tags: [Attendance]
      summary: Mark student attendance via scan
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Attendance recorded